<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-Tuklas Online Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ════════════════════════════════════════════════════
   TOKENS
   ════════════════════════════════════════════════════ */
:root{
  --bg:#f7f5f0; --surface:#ffffff; --surface-2:#f0eee8; --border:#e2dfd6;
  --text:#1c1b19; --muted:#6b6963;
  --accent:#0e8f84; --accent-soft:#e3f5f2;
  --approved:#1a8f5c; --approved-soft:#e3f5ea;
  --revision:#b5790a; --revision-soft:#faf0dc;
  --rejected:#c23b3b; --rejected-soft:#fbe6e6;
  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;
  --radius:12px; --shadow:0 1px 2px rgba(20,18,14,.06), 0 6px 20px rgba(20,18,14,.05);
}
[data-theme="dark"]{
  --bg:#17181c; --surface:#202126; --surface-2:#292a30; --border:#35363c;
  --text:#ededef; --muted:#9a9ba3;
  --accent:#2fd6c8; --accent-soft:#173330;
  --approved:#4ade80; --approved-soft:#153524;
  --revision:#fbbf24; --revision-soft:#3a2f10;
  --rejected:#f87171; --rejected-soft:#3a1717;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 6px 24px rgba(0,0,0,.35);
}
*{box-sizing:border-box;}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--font-body);transition:background .2s,color .2s;}
h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
.app{min-height:100vh;display:flex;}
.topbar{position:sticky;top:0;z-index:10;display:flex;align-items:center;justify-content:space-between;padding:14px 24px;background:var(--surface);border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:10px;}
.brand-mark{width:30px;height:30px;border-radius:9px;background:var(--accent);display:flex;align-items:center;justify-content:center;color:var(--bg);font-family:var(--font-display);font-weight:700;font-size:15px;}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:17px;}
.pill{display:inline-flex;align-items:center;gap:6px;padding:4px 11px;border-radius:99px;font-size:12.5px;font-weight:600;}
.pill-approved{background:var(--approved-soft);color:var(--approved);}
.pill-revision{background:var(--revision-soft);color:var(--revision);}
.pill-rejected{background:var(--rejected-soft);color:var(--rejected);}
.pill-neutral{background:var(--surface-2);color:var(--muted);}
.btn{border:none;border-radius:9px;padding:10px 18px;font-size:14px;font-weight:600;transition:opacity .15s,transform .1s;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--accent);color:#08211f;}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-ghost{background:transparent;border:none;color:var(--muted);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;}
.input,.select,.textarea{width:100%;padding:10px 13px;border-radius:9px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-size:14px;}
.label{font-size:12.5px;font-weight:600;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:block;}
.shell{flex:1;display:flex;flex-direction:column;}
.main{max-width:1080px;width:100%;margin:0 auto;padding:28px 24px 60px;}
.sidebar{width:210px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);padding:18px 12px;display:flex;flex-direction:column;gap:2px;}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;font-size:14px;font-weight:500;color:var(--muted);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}
.grade-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
.grade-ring svg{transform:rotate(-90deg);}
.grade-ring-value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:var(--font-mono);font-weight:600;font-size:13px;}
.section-card{display:flex;align-items:center;gap:16px;padding:16px;border:1px solid var(--border);border-radius:var(--radius);background:var(--surface);margin-bottom:12px;}
.badge-purple{background:var(--accent-soft);color:var(--accent);padding:3px 9px;border-radius:99px;font-size:11.5px;font-weight:600;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;color:var(--muted);font-weight:600;font-size:12px;text-transform:uppercase;letter-spacing:.03em;padding:8px 10px;border-bottom:1px solid var(--border);}
td{padding:10px;border-bottom:1px solid var(--border);}
tr:hover td{background:var(--surface-2);}
.rubric-list{display:flex;flex-direction:column;gap:6px;margin:10px 0;}
.rubric-item{display:flex;justify-content:space-between;padding:7px 10px;border-radius:7px;background:var(--surface-2);font-size:13px;}
.rubric-score{font-family:var(--font-mono);font-weight:600;color:var(--muted);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite;display:inline-block;}
@keyframes spin{to{transform:rotate(360deg);}}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;}
.modal{background:var(--surface);border-radius:16px;max-width:520px;width:100%;padding:26px;box-shadow:var(--shadow);max-height:85vh;overflow-y:auto;}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0;}
.stat-box{background:var(--surface-2);border-radius:10px;padding:14px;}
.stat-box .num{font-family:var(--font-mono);font-size:22px;font-weight:600;}
.stat-box .lbl{font-size:12px;color:var(--muted);margin-top:2px;}
@media(max-width:760px){.sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;flex-direction:row;justify-content:space-around;border-right:none;border-top:1px solid var(--border);padding:8px;z-index:20;} .nav-item span:last-child{display:none;} .main{padding-bottom:90px;}}
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ════════════════════════════════════════════════════
   CONFIG — fill these in before deploying
   ════════════════════════════════════════════════════ */
const CONFIG = {
  SUPABASE_URL: "https://lbwdgabvajdcffsnsulq.supabase.co",
  SUPABASE_PUBLISHABLE_KEY: "PASTE_YOUR_REGENERATED_PUBLISHABLE_KEY_HERE",
  BACKEND_URL: "https://YOUR-RENDER-SERVICE.onrender.com"
};

const { createClient } = supabase;
const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_PUBLISHABLE_KEY);

const h = React.createElement;
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const SECTIONS = [
  { id: "abstract", label: "Abstract" },
  { id: "rationale", label: "Rationale / Background of the Study" },
  { id: "methodology", label: "Methodology" }
];
const CATEGORIES = [
  "Life Science",
  "Mathematical and Computational Science",
  "Physical Science",
  "Robotics and Intelligent Machines",
  "Innovation Expo"
];
const MAX_FILE_BYTES = 5 * 1024 * 1024;
const STATUS_META = {
  approved:      { label: "Approved",       cls: "pill-approved" },
  needs_revision:{ label: "Needs Revision", cls: "pill-revision" },
  rejected:      { label: "Rejected",       cls: "pill-rejected" },
  error:         { label: "Error",          cls: "pill-rejected" }
};

async function authedFetch(path, opts = {}) {
  const { data: { session } } = await sb.auth.getSession();
  const res = await fetch(CONFIG.BACKEND_URL + path, {
    ...opts,
    headers: {
      "Content-Type": "application/json",
      "Authorization": "Bearer " + (session?.access_token || ""),
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    let msg = "Request failed";
    try { msg = (await res.json()).error || msg; } catch (e) {}
    throw new Error(msg);
  }
  return res;
}

/* ── Grade ring: the app's signature element ─────────── */
function GradeRing({ score, status, size = 56 }) {
  if (score == null) {
    return h("div", { className: "grade-ring", style: { width: size, height: size } },
      h("div", { className: "grade-ring-value", style: { color: "var(--muted)", fontSize: 11 } }, "—")
    );
  }
  const color = status === "approved" ? "var(--approved)" : status === "needs_revision" ? "var(--revision)" : "var(--rejected)";
  const r = (size - 8) / 2, c = 2 * Math.PI * r, offset = c * (1 - score / 100);
  return h("div", { className: "grade-ring", style: { width: size, height: size } },
    h("svg", { width: size, height: size },
      h("circle", { cx: size/2, cy: size/2, r, stroke: "var(--border)", strokeWidth: 4, fill: "none" }),
      h("circle", { cx: size/2, cy: size/2, r, stroke: color, strokeWidth: 4, fill: "none",
        strokeDasharray: c, strokeDashoffset: offset, strokeLinecap: "round",
        style: { transition: "stroke-dashoffset .5s ease" } })
    ),
    h("div", { className: "grade-ring-value" }, score)
  );
}

function StatusPill({ status }) {
  const meta = STATUS_META[status] || { label: "Not Started", cls: "pill-neutral" };
  return h("span", { className: "pill " + meta.cls }, meta.label);
}

/* ════════════════════════════════════════════════════
   AUTH SCREEN
   ════════════════════════════════════════════════════ */
function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState(""), [password, setPassword] = useState("");
  const [fullName, setFullName] = useState("");
  const [error, setError] = useState(""), [loading, setLoading] = useState(false);
  const [notice, setNotice] = useState("");

  async function submit(e) {
    e.preventDefault();
    setError(""); setNotice(""); setLoading(true);
    try {
      if (mode === "signup") {
        const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
        if (error) throw error;
        setNotice("Account created. Check your email to confirm, then sign in.");
        setMode("signin");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  }

  return h("div", { style: { minHeight: "100vh", display: "flex", alignItems: "center", justifyContent: "center", padding: 20 } },
    h("form", { className: "card", style: { width: 380 }, onSubmit: submit },
      h("div", { style: { display: "flex", alignItems: "center", gap: 10, marginBottom: 22 } },
        h("div", { className: "brand-mark" }, "E"),
        h("h1", { style: { fontSize: 20 } }, "E-Tuklas Checker")
      ),
      mode === "signup" && h("div", { style: { marginBottom: 14 } },
        h("label", { className: "label" }, "Full Name"),
        h("input", { className: "input", value: fullName, onChange: e => setFullName(e.target.value), required: true })
      ),
      h("div", { style: { marginBottom: 14 } },
        h("label", { className: "label" }, "Email"),
        h("input", { className: "input", type: "email", value: email, onChange: e => setEmail(e.target.value), required: true })
      ),
      h("div", { style: { marginBottom: 18 } },
        h("label", { className: "label" }, "Password"),
        h("input", { className: "input", type: "password", value: password, onChange: e => setPassword(e.target.value), required: true, minLength: 6 })
      ),
      error && h("div", { style: { color: "var(--rejected)", fontSize: 13, marginBottom: 12 } }, error),
      notice && h("div", { style: { color: "var(--approved)", fontSize: 13, marginBottom: 12 } }, notice),
      h("button", { className: "btn btn-primary", style: { width: "100%" }, disabled: loading },
        loading ? h("span", { className: "spinner" }) : (mode === "signup" ? "Create Account" : "Sign In")
      ),
      h("div", { style: { textAlign: "center", marginTop: 14, fontSize: 13, color: "var(--muted)" } },
        mode === "signup" ? "Already have an account? " : "New here? ",
        h("a", { href: "#", onClick: (e) => { e.preventDefault(); setMode(mode === "signup" ? "signin" : "signup"); } },
          mode === "signup" ? "Sign in" : "Create one")
      )
    )
  );
}

/* ════════════════════════════════════════════════════
   PROJECT SETUP GATE (student — required before upload)
   ════════════════════════════════════════════════════ */
function ProjectSetupGate({ profile, onDone }) {
  const [category, setCategory] = useState(profile.category || "");
  const [teamMode, setTeamMode] = useState(profile.team_mode || "individual");
  const [coAuthors, setCoAuthors] = useState(profile.co_authors || []);
  const [query, setQuery] = useState("");
  const [candidates, setCandidates] = useState([]);
  const [error, setError] = useState(""), [saving, setSaving] = useState(false);

  useEffect(() => {
    if (query.trim().length < 2) { setCandidates([]); return; }
    let cancelled = false;
    sb.from("profiles").select("id, email, full_name").ilike("email", `%${query}%`).limit(6)
      .then(({ data }) => { if (!cancelled) setCandidates(data || []); });
    return () => { cancelled = true; };
  }, [query]);

  function addCoAuthor(p) {
    if (coAuthors.some(c => c.email === p.email)) return;
    setCoAuthors([...coAuthors, { email: p.email, name: p.full_name || p.email }]);
    setQuery("");
  }
  function removeCoAuthor(email) {
    setCoAuthors(coAuthors.filter(c => c.email !== email));
  }

  async function save() {
    if (!category) { setError("Pick a research category first."); return; }
    setSaving(true); setError("");
    const { error } = await sb.from("profiles").update({
      category, team_mode: teamMode,
      co_authors: teamMode === "team" ? coAuthors : []
    }).eq("id", profile.id);
    setSaving(false);
    if (error) { setError(error.message); return; }
    onDone({ ...profile, category, team_mode: teamMode, co_authors: teamMode === "team" ? coAuthors : [] });
  }

  return h("div", { className: "main", style: { maxWidth: 560 } },
    h("div", { className: "card" },
      h("h2", { style: { marginBottom: 6 } }, "Set up your project"),
      h("p", { style: { color: "var(--muted)", fontSize: 14, marginBottom: 20 } },
        "Pick your research category and tell us if you're working solo or with co-authors. This is required before you can upload any section — teammates automatically see whatever grade an uploaded section gets."),
      h("label", { className: "label" }, "Research Category"),
      h("select", { className: "select", value: category, onChange: e => setCategory(e.target.value), style: { marginBottom: 16 } },
        h("option", { value: "" }, "Select a category…"),
        CATEGORIES.map(c => h("option", { key: c, value: c }, c))
      ),
      h("label", { className: "label" }, "Working Mode"),
      h("div", { style: { display: "flex", gap: 8, marginBottom: 16 } },
        ["individual", "team"].map(m => h("button", {
          key: m, type: "button",
          className: "btn " + (teamMode === m ? "btn-primary" : "btn-outline"),
          style: { flex: 1 },
          onClick: () => setTeamMode(m)
        }, m === "individual" ? "Individual" : "Team"))
      ),
      teamMode === "team" && h("div", { style: { marginBottom: 16 } },
        h("label", { className: "label" }, "Add Co-Authors (search by email)"),
        h("input", { className: "input", value: query, onChange: e => setQuery(e.target.value), placeholder: "type at least 2 characters…" }),
        candidates.length > 0 && h("div", { className: "card", style: { marginTop: 6, padding: 8 } },
          candidates.map(c => h("div", {
            key: c.id, onClick: () => addCoAuthor(c),
            style: { padding: "7px 9px", borderRadius: 7, cursor: "pointer", fontSize: 13 },
            onMouseEnter: e => e.currentTarget.style.background = "var(--surface-2)",
            onMouseLeave: e => e.currentTarget.style.background = "transparent"
          }, c.full_name || c.email, h("span", { style: { color: "var(--muted)" } }, "  · " + c.email)))
        ),
        h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 } },
          coAuthors.map(c => h("span", { key: c.email, className: "badge-purple" },
            c.name, " ", h("a", { href: "#", style: { marginLeft: 4, color: "inherit" }, onClick: e => { e.preventDefault(); removeCoAuthor(c.email); } }, "×")
          ))
        )
      ),
      error && h("div", { style: { color: "var(--rejected)", fontSize: 13, marginBottom: 12 } }, error),
      h("button", { className: "btn btn-primary", onClick: save, disabled: saving },
        saving ? h("span", { className: "spinner" }) : "Save & Continue")
    )
  );
}

/* ════════════════════════════════════════════════════
   FILE TEXT EXTRACTION (client-side, text only — no blob storage)
   ════════════════════════════════════════════════════ */
async function extractText(file) {
  if (file.size > MAX_FILE_BYTES) throw new Error("File too large (max 5MB).");
  const name = file.name.toLowerCase();
  if (name.endsWith(".txt") || name.endsWith(".md")) return await file.text();
  if (name.endsWith(".docx")) {
    if (!window.mammoth) throw new Error("Document reader not loaded — refresh and try again.");
    const buf = await file.arrayBuffer();
    const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
    return result.value;
  }
  throw new Error("Unsupported file type — upload .docx or .txt.");
}

/* ════════════════════════════════════════════════════
   STUDENT DASHBOARD
   ════════════════════════════════════════════════════ */
function SectionUploadCard({ profile, sectionDef, submission, onUpdated }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const fileRef = useRef();

  async function handleFile(e) {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true); setError("");
    try {
      const text = await extractText(file);
      if (text.trim().length < 20) throw new Error("Extracted text looks too short — check the file.");

      const { data: existing } = await sb.from("submissions")
        .select("id").eq("uploader_id", profile.id).eq("section_id", sectionDef.id).maybeSingle();

      let submissionId = existing?.id;
      if (!submissionId) {
        const { data: created, error: insErr } = await sb.from("submissions").insert({
          uploader_id: profile.id, section_id: sectionDef.id, category: profile.category,
          team_emails: (profile.co_authors || []).map(c => c.email),
          file_name: file.name, extracted_text: text
        }).select("id").single();
        if (insErr) throw insErr;
        submissionId = created.id;
      } else {
        await sb.from("submissions").update({
          file_name: file.name, extracted_text: text,
          category: profile.category, team_emails: (profile.co_authors || []).map(c => c.email)
        }).eq("id", submissionId);
      }

      const res = await authedFetch("/api/grade", {
        method: "POST",
        body: JSON.stringify({ submissionId, sectionId: sectionDef.id, text })
      });
      const { verdict } = await res.json();
      onUpdated(sectionDef.id, { ...submission, id: submissionId, file_name: file.name, ai_status: verdict.status, ai_score: verdict.scorePercent, ai_criteria: verdict.criteria, ai_remarks: verdict.remarks, ai_provider: verdict.provider });
    } catch (e) {
      setError(e.message);
    }
    setBusy(false);
  }

  const prevScore = submission?.ai_history?.[0]?.score;
  const trend = (submission?.ai_score != null && prevScore != null) ? submission.ai_score - prevScore : null;

  return h("div", { className: "card", style: { marginBottom: 14 } },
    h("div", { className: "section-card", style: { border: "none", padding: 0, marginBottom: submission ? 14 : 0 } },
      h(GradeRing, { score: submission?.ai_score, status: submission?.ai_status }),
      h("div", { style: { flex: 1 } },
        h("div", { style: { fontWeight: 600, fontSize: 15 } }, sectionDef.label),
        h("div", { style: { fontSize: 12.5, color: "var(--muted)", marginTop: 2 } },
          submission?.file_name || "No file uploaded yet"),
        trend != null && h("div", { style: { fontSize: 12, marginTop: 4, color: trend >= 0 ? "var(--approved)" : "var(--rejected)" } },
          (trend >= 0 ? "▲ +" : "▼ ") + trend + " vs. last attempt")
      ),
      h(StatusPill, { status: submission?.ai_status }),
      h("div", null,
        h("input", { type: "file", ref: fileRef, accept: ".docx,.txt,.md", style: { display: "none" }, onChange: handleFile }),
        h("button", { className: "btn btn-outline", onClick: () => fileRef.current.click(), disabled: busy },
          busy ? h("span", { className: "spinner" }) : (submission ? "Re-upload" : "Upload"))
      )
    ),
    error && h("div", { style: { color: "var(--rejected)", fontSize: 13, marginTop: 8 } }, error),
    submission?.ai_criteria && h("div", { className: "rubric-list" },
      submission.ai_criteria.map((c, i) => h("div", { className: "rubric-item", key: i },
        h("span", null, c.name, h("div", { style: { fontSize: 11.5, color: "var(--muted)", marginTop: 2 } }, c.note)),
        h("span", { className: "rubric-score" }, c.score + "/" + c.max)
      ))
    ),
    submission?.ai_remarks && h("div", { style: { fontSize: 13, marginTop: 8, lineHeight: 1.5 } },
      h("strong", null, "Remarks: "), submission.ai_remarks),
    submission?.teacher_verdict && h("div", { style: { fontSize: 13, marginTop: 10, padding: 10, borderRadius: 8, background: "var(--accent-soft)", color: "var(--accent)" } },
      h("strong", null, "Teacher override: "), submission.teacher_verdict.score + "/100 — " + (submission.teacher_verdict.note || ""))
  );
}

function StudentDashboard({ profile }) {
  const [subs, setSubs] = useState({});
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    const { data } = await sb.from("submissions").select("*").eq("uploader_id", profile.id);
    const map = {};
    (data || []).forEach(s => map[s.section_id] = s);
    setSubs(map);
    setLoading(false);
  }, [profile.id]);

  useEffect(() => { load(); }, [load]);

  const doneCount = SECTIONS.filter(s => subs[s.id]?.ai_status === "approved").length;

  return h("div", { className: "main" },
    h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 18 } },
      h("div", null,
        h("h2", null, "My Submissions"),
        h("div", { style: { color: "var(--muted)", fontSize: 13.5, marginTop: 4 } },
          h("span", { className: "badge-purple" }, profile.category), "  ",
          profile.team_mode === "team" ? `Team of ${1 + (profile.co_authors || []).length}` : "Individual")
      ),
      h("div", { className: "pill pill-neutral" }, `${doneCount}/${SECTIONS.length} approved`)
    ),
    loading ? h("div", { className: "empty-state" }, h("span", { className: "spinner" })) :
      SECTIONS.map(s => h(SectionUploadCard, {
        key: s.id, profile, sectionDef: s, submission: subs[s.id],
        onUpdated: (id, updated) => setSubs(prev => ({ ...prev, [id]: updated }))
      }))
  );
}

/* ════════════════════════════════════════════════════
   TEACHER / ADMIN DASHBOARD
   ════════════════════════════════════════════════════ */
function TeacherOverviewTab({ subs, onRefresh }) {
  const [catFilter, setCatFilter] = useState("");
  const [statusFilter, setStatusFilter] = useState("");
  const [search, setSearch] = useState("");
  const [selected, setSelected] = useState(new Set());
  const [active, setActive] = useState(null);
  const [busy, setBusy] = useState(false);

  const filtered = useMemo(() => subs.filter(s => {
    if (catFilter && s.category !== catFilter) return false;
    if (statusFilter && s.ai_status !== statusFilter) return false;
    if (search) {
      const hay = (s.profiles?.full_name + " " + s.profiles?.email + " " + (s.team_emails || []).join(" ")).toLowerCase();
      if (!hay.includes(search.toLowerCase())) return false;
    }
    return true;
  }), [subs, catFilter, statusFilter, search]);

  function toggle(id) {
    const next = new Set(selected);
    next.has(id) ? next.delete(id) : next.add(id);
    setSelected(next);
  }

  async function bulkDelete() {
    if (!selected.size || !confirm(`Delete ${selected.size} submission(s)? This cannot be undone.`)) return;
    setBusy(true);
    await authedFetch("/api/admin/bulk-delete", { method: "POST", body: JSON.stringify({ ids: [...selected] }) });
    setSelected(new Set());
    setBusy(false);
    onRefresh();
  }

  async function exportCsv() {
    const { data: { session } } = await sb.auth.getSession();
    const res = await fetch(CONFIG.BACKEND_URL + "/api/admin/export-csv", {
      headers: { Authorization: "Bearer " + session.access_token }
    });
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url; a.download = "submissions.csv"; a.click();
    URL.revokeObjectURL(url);
  }

  return h(React.Fragment, null,
    h("div", { style: { display: "flex", gap: 10, flexWrap: "wrap", marginBottom: 16 } },
      h("select", { className: "select", style: { width: "auto" }, value: catFilter, onChange: e => setCatFilter(e.target.value) },
        h("option", { value: "" }, "All categories"), CATEGORIES.map(c => h("option", { key: c, value: c }, c))),
      h("select", { className: "select", style: { width: "auto" }, value: statusFilter, onChange: e => setStatusFilter(e.target.value) },
        h("option", { value: "" }, "All statuses"),
        Object.entries(STATUS_META).filter(([k]) => k !== "error").map(([k, v]) => h("option", { key: k, value: k }, v.label))),
      h("input", { className: "input", style: { width: 220 }, placeholder: "Search student or co-author…", value: search, onChange: e => setSearch(e.target.value) }),
      h("div", { style: { flex: 1 } }),
      selected.size > 0 && h("button", { className: "btn btn-outline", onClick: bulkDelete, disabled: busy }, `Delete ${selected.size} selected`),
      h("button", { className: "btn btn-outline", onClick: exportCsv }, "Export CSV")
    ),
    h("div", { className: "card", style: { padding: 0, overflowX: "auto" } },
      h("table", null,
        h("thead", null, h("tr", null,
          h("th", null), h("th", null, "Student"), h("th", null, "Section"), h("th", null, "Category"),
          h("th", null, "Score"), h("th", null, "Status"), h("th", null, "Provider")
        )),
        h("tbody", null,
          filtered.length === 0 ? h("tr", null, h("td", { colSpan: 7, className: "empty-state" }, "No submissions match these filters.")) :
          filtered.map(s => h("tr", { key: s.id, style: { cursor: "pointer" }, onClick: () => setActive(s) },
            h("td", { onClick: e => e.stopPropagation() }, h("input", { type: "checkbox", checked: selected.has(s.id), onChange: () => toggle(s.id) })),
            h("td", null, s.profiles?.full_name || s.profiles?.email),
            h("td", null, SECTIONS.find(x => x.id === s.section_id)?.label || s.section_id),
            h("td", null, h("span", { className: "badge-purple" }, s.category || "—")),
            h("td", null, s.ai_score != null ? s.ai_score : "—"),
            h("td", null, h(StatusPill, { status: s.ai_status })),
            h("td", null, s.ai_provider || "—")
          ))
        )
      )
    ),
    active && h(SubmissionDetailModal, { submission: active, onClose: () => setActive(null), onSaved: () => { setActive(null); onRefresh(); } })
  );
}

function SubmissionDetailModal({ submission, onClose, onSaved }) {
  const [score, setScore] = useState(submission.teacher_verdict?.score ?? submission.ai_score ?? 0);
  const [note, setNote] = useState(submission.teacher_verdict?.note || "");
  const [saving, setSaving] = useState(false);

  async function save() {
    setSaving(true);
    await authedFetch("/api/admin/teacher-verdict", {
      method: "POST", body: JSON.stringify({ submissionId: submission.id, score: Number(score), note })
    });
    setSaving(false);
    onSaved();
  }

  return h("div", { className: "modal-overlay", onClick: onClose },
    h("div", { className: "modal", onClick: e => e.stopPropagation() },
      h("div", { style: { display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 14 } },
        h("div", null,
          h("h3", null, submission.profiles?.full_name || submission.profiles?.email),
          h("div", { style: { fontSize: 13, color: "var(--muted)" } }, SECTIONS.find(x => x.id === submission.section_id)?.label)
        ),
        h(GradeRing, { score: submission.ai_score, status: submission.ai_status })
      ),
      submission.ai_criteria && h("div", { className: "rubric-list" },
        submission.ai_criteria.map((c, i) => h("div", { className: "rubric-item", key: i },
          h("span", null, c.name), h("span", { className: "rubric-score" }, c.score + "/" + c.max)))),
      submission.ai_remarks && h("p", { style: { fontSize: 13, lineHeight: 1.5 } }, submission.ai_remarks),
      h("hr", { style: { border: "none", borderTop: "1px solid var(--border)", margin: "16px 0" } }),
      h("label", { className: "label" }, "Teacher Override Score"),
      h("input", { className: "input", type: "number", min: 0, max: 100, value: score, onChange: e => setScore(e.target.value), style: { marginBottom: 12 } }),
      h("label", { className: "label" }, "Note"),
      h("textarea", { className: "textarea", rows: 3, value: note, onChange: e => setNote(e.target.value), style: { marginBottom: 16 } }),
      h("div", { style: { display: "flex", gap: 8, justifyContent: "flex-end" } },
        h("button", { className: "btn btn-ghost", onClick: onClose }, "Cancel"),
        h("button", { className: "btn btn-primary", onClick: save, disabled: saving }, saving ? h("span", { className: "spinner" }) : "Save Override")
      )
    )
  );
}

function TeacherStatsTab({ subs }) {
  const byCategory = useMemo(() => {
    const map = {};
    CATEGORIES.forEach(c => map[c] = { total: 0, avg: 0, needsRevision: 0, sum: 0, scored: 0 });
    subs.forEach(s => {
      const bucket = map[s.category] || (map[s.category] = { total: 0, avg: 0, needsRevision: 0, sum: 0, scored: 0 });
      bucket.total++;
      if (s.ai_status === "needs_revision") bucket.needsRevision++;
      if (s.ai_score != null) { bucket.sum += s.ai_score; bucket.scored++; }
    });
    Object.values(map).forEach(b => b.avg = b.scored ? Math.round(b.sum / b.scored) : 0);
    return map;
  }, [subs]);

  return h("div", { className: "stat-grid" },
    Object.entries(byCategory).map(([cat, b]) => h("div", { className: "card", key: cat },
      h("div", { style: { fontWeight: 600, fontSize: 13.5, marginBottom: 10 } }, cat),
      h("div", { className: "stat-grid", style: { margin: 0 } },
        h("div", { className: "stat-box" }, h("div", { className: "num" }, b.total), h("div", { className: "lbl" }, "Submissions")),
        h("div", { className: "stat-box" }, h("div", { className: "num" }, b.avg), h("div", { className: "lbl" }, "Avg Score")),
        h("div", { className: "stat-box" }, h("div", { className: "num" }, b.needsRevision), h("div", { className: "lbl" }, "Need Revision"))
      )
    ))
  );
}

function TeacherTeamsTab({ subs }) {
  const teams = useMemo(() => {
    const map = {};
    subs.forEach(s => {
      const key = s.uploader_id;
      if (!map[key]) map[key] = { lead: s.profiles, category: s.category, coAuthors: s.team_emails || [], sections: {} };
      map[key].sections[s.section_id] = s.ai_status;
    });
    return Object.values(map);
  }, [subs]);

  return h("div", { className: "card", style: { padding: 0, overflowX: "auto" } },
    h("p", { style: { padding: "14px 16px 0", fontSize: 12.5, color: "var(--muted)" } },
      "Built automatically from each student's Project Setup — nothing to manage here."),
    h("table", null,
      h("thead", null, h("tr", null, h("th", null, "Lead"), h("th", null, "Category"), h("th", null, "Co-Authors"), h("th", null, "Sections Approved"))),
      h("tbody", null, teams.map((t, i) => h("tr", { key: i },
        h("td", null, t.lead?.full_name || t.lead?.email),
        h("td", null, h("span", { className: "badge-purple" }, t.category || "—")),
        h("td", null, t.coAuthors.length ? t.coAuthors.join(", ") : "—"),
        h("td", null, `${Object.values(t.sections).filter(s => s === "approved").length}/${SECTIONS.length}`)
      )))
    )
  );
}

function AdminTab({ profile }) {
  const [users, setUsers] = useState([]);
  const [config, setConfig] = useState({ primary: "gemini", fallback: "groq" });
  const [saving, setSaving] = useState(false);

  const load = useCallback(async () => {
    const { data } = await sb.from("profiles").select("*").order("created_at", { ascending: false });
    setUsers(data || []);
  }, []);
  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    authedFetch("/api/admin/config").then(r => r.json()).then(d => d.config && setConfig(d.config)).catch(() => {});
  }, []);

  async function setApproval(userId, approved) {
    await authedFetch("/api/admin/set-approval", { method: "POST", body: JSON.stringify({ userId, approved }) });
    load();
  }
  async function setRole(userId, role) {
    await authedFetch("/api/admin/set-role", { method: "POST", body: JSON.stringify({ userId, role }) });
    load();
  }
  async function saveConfig() {
    setSaving(true);
    await authedFetch("/api/admin/config", { method: "POST", body: JSON.stringify(config) });
    setSaving(false);
  }

  return h(React.Fragment, null,
    h("div", { className: "card", style: { marginBottom: 18 } },
      h("h3", { style: { marginBottom: 12, fontSize: 16 } }, "AI Provider"),
      h("p", { style: { fontSize: 12.5, color: "var(--muted)", marginBottom: 12 } }, "Keys live only in Render's environment — this just controls which provider is primary/fallback."),
      h("div", { style: { display: "flex", gap: 10 } },
        h("select", { className: "select", value: config.primary, onChange: e => setConfig({ ...config, primary: e.target.value }) },
          h("option", { value: "gemini" }, "Gemini"), h("option", { value: "groq" }, "Groq")),
        h("select", { className: "select", value: config.fallback, onChange: e => setConfig({ ...config, fallback: e.target.value }) },
          h("option", { value: "groq" }, "Groq"), h("option", { value: "gemini" }, "Gemini")),
        h("button", { className: "btn btn-primary", onClick: saveConfig, disabled: saving }, saving ? h("span", { className: "spinner" }) : "Save")
      )
    ),
    h("div", { className: "card", style: { padding: 0, overflowX: "auto" } },
      h("table", null,
        h("thead", null, h("tr", null, h("th", null, "Name"), h("th", null, "Email"), h("th", null, "Role"), h("th", null, "Approved"), h("th", null))),
        h("tbody", null, users.map(u => h("tr", { key: u.id },
          h("td", null, u.full_name || "—"), h("td", null, u.email),
          h("td", null, h("select", { className: "select", style: { width: "auto" }, value: u.role, onChange: e => setRole(u.id, e.target.value) },
            ["student", "teacher", "admin"].map(r => h("option", { key: r, value: r }, r)))),
          h("td", null, u.approved ? "Yes" : "No"),
          h("td", null, h("button", { className: "btn btn-outline", onClick: () => setApproval(u.id, !u.approved) }, u.approved ? "Revoke" : "Approve"))
        )))
      )
    )
  );
}

function TeacherDashboard({ profile }) {
  const [tab, setTab] = useState("overview");
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    const { data } = await sb.from("submissions").select("*, profiles(full_name, email)").order("submitted_at", { ascending: false });
    setSubs(data || []);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const tabs = [
    { id: "overview", label: "Submissions" },
    { id: "stats", label: "Stats" },
    { id: "teams", label: "Teams" },
    ...(profile.role === "admin" ? [{ id: "admin", label: "Admin" }] : [])
  ];

  return h("div", { className: "main" },
    h("div", { style: { display: "flex", gap: 6, marginBottom: 20, borderBottom: "1px solid var(--border)" } },
      tabs.map(t => h("button", {
        key: t.id, className: "btn btn-ghost",
        style: { borderBottom: tab === t.id ? "2px solid var(--accent)" : "2px solid transparent", borderRadius: 0, color: tab === t.id ? "var(--accent)" : "var(--muted)" },
        onClick: () => setTab(t.id)
      }, t.label))
    ),
    loading ? h("div", { className: "empty-state" }, h("span", { className: "spinner" })) :
      tab === "overview" ? h(TeacherOverviewTab, { subs, onRefresh: load }) :
      tab === "stats" ? h(TeacherStatsTab, { subs }) :
      tab === "teams" ? h(TeacherTeamsTab, { subs }) :
      h(AdminTab, { profile })
  );
}

/* ════════════════════════════════════════════════════
   ROOT APP
   ════════════════════════════════════════════════════ */
function App() {
  const [session, setSession] = useState(undefined);
  const [profile, setProfile] = useState(null);
  const [theme, setTheme] = useState(localStorage.getItem("etuklas-oc-theme") || "dark");

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); localStorage.setItem("etuklas-oc-theme", theme); }, [theme]);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setProfile(null); return; }
    let cancelled = false;
    sb.from("profiles").select("*").eq("id", session.user.id).single().then(({ data }) => {
      if (!cancelled) setProfile(data);
    });
    const channel = sb.channel("profile-" + session.user.id)
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "profiles", filter: `id=eq.${session.user.id}` },
        payload => setProfile(payload.new))
      .subscribe();
    return () => { cancelled = true; sb.removeChannel(channel); };
  }, [session]);

  if (session === undefined) return h("div", { className: "empty-state" }, h("span", { className: "spinner" }));
  if (!session) return h(AuthScreen);
  if (!profile) return h("div", { className: "empty-state" }, h("span", { className: "spinner" }));

  if (!profile.approved && profile.role === "student") {
    return h("div", { className: "empty-state" }, h("h2", null, "Awaiting approval"),
      h("p", { style: { color: "var(--muted)", marginTop: 8 } }, "Your teacher needs to approve your account before you can submit."));
  }

  const isTeacher = profile.role === "teacher" || profile.role === "admin";
  const needsSetup = profile.role === "student" && !profile.category;

  return h("div", { className: "app" },
    h("div", { className: "shell" },
      h("div", { className: "topbar" },
        h("div", { className: "brand" }, h("div", { className: "brand-mark" }, "E"), h("div", { className: "brand-name" }, "E-Tuklas Checker")),
        h("div", { style: { display: "flex", alignItems: "center", gap: 12 } },
          h("span", { style: { fontSize: 13, color: "var(--muted)" } }, profile.full_name || profile.email),
          h("button", { className: "btn btn-ghost", onClick: () => setTheme(theme === "dark" ? "light" : "dark") }, theme === "dark" ? "☀" : "☾"),
          h("button", { className: "btn btn-outline", onClick: () => sb.auth.signOut() }, "Sign Out")
        )
      ),
      needsSetup ? h(ProjectSetupGate, { profile, onDone: setProfile }) :
        isTeacher ? h(TeacherDashboard, { profile }) : h(StudentDashboard, { profile })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
</body>
