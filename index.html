<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>E-Tuklas Online Checker</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<style>
/* ════════════════════════════════════════════════════
   DESIGN TOKENS — E-Tuklas design system
   ════════════════════════════════════════════════════ */
:root{
  --bg:#f6f5f2; --surface:#ffffff; --surface-2:#f0efe9; --surface-3:#e8e6de;
  --border:#e3e0d6; --border-strong:#d3cfc1;
  --text:#181a1f; --text-2:#3b3d44; --muted:#6f7178; --muted-2:#9a9ba3;

  --ink:#0f2f3d;
  --accent:#0d8f7f; --accent-hover:#0a7568; --accent-soft:#e2f4f0; --accent-contrast:#ffffff;
  --accent-2:#c98f2b;

  --approved:#1a8f5c; --approved-soft:#e3f5ea; --approved-strong:#0f6b43;
  --revision:#b5790a; --revision-soft:#faf0dc; --revision-strong:#8a5c05;
  --rejected:#c23b3b; --rejected-soft:#fbe6e6; --rejected-strong:#9c2b2b;

  --font-display:'Fraunces',serif; --font-body:'Inter',sans-serif; --font-mono:'IBM Plex Mono',monospace;

  --radius-sm:8px; --radius:12px; --radius-lg:18px; --radius-xl:24px;
  --shadow-xs:0 1px 2px rgba(15,20,25,.05);
  --shadow-sm:0 1px 2px rgba(15,20,25,.04), 0 4px 10px rgba(15,20,25,.05);
  --shadow-md:0 2px 6px rgba(15,20,25,.06), 0 12px 28px rgba(15,20,25,.08);
  --shadow-lg:0 8px 24px rgba(15,20,25,.10), 0 24px 56px rgba(15,20,25,.12);
  --ring:0 0 0 3px var(--accent-soft);
  --ease:cubic-bezier(.4,0,.2,1);
}
[data-theme="dark"]{
  --bg:#12141a; --surface:#1a1d24; --surface-2:#22252d; --surface-3:#2b2f38;
  --border:#31353f; --border-strong:#40454f;
  --text:#eef0f4; --text-2:#c7cad2; --muted:#8d919c; --muted-2:#6c707a;

  --ink:#e9f4f1;
  --accent:#33d4b8; --accent-hover:#5ee0c9; --accent-soft:#163431; --accent-contrast:#06231e;
  --accent-2:#e0ac4c;

  --approved:#4ade80; --approved-soft:#153524; --approved-strong:#7cf0a6;
  --revision:#fbbf24; --revision-soft:#3a2f10; --revision-strong:#ffd268;
  --rejected:#f87171; --rejected-soft:#3a1717; --rejected-strong:#ff9c9c;

  --shadow-xs:0 1px 2px rgba(0,0,0,.35);
  --shadow-sm:0 1px 2px rgba(0,0,0,.3), 0 4px 14px rgba(0,0,0,.35);
  --shadow-md:0 2px 8px rgba(0,0,0,.35), 0 16px 36px rgba(0,0,0,.4);
  --shadow-lg:0 10px 30px rgba(0,0,0,.45), 0 30px 70px rgba(0,0,0,.5);
  --ring:0 0 0 3px rgba(51,212,184,.22);
}

*{box-sizing:border-box;}
::selection{background:var(--accent-soft);}
html{-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
body{margin:0;background:
    radial-gradient(1100px 520px at 8% -8%, color-mix(in srgb, var(--accent) 7%, transparent), transparent 60%),
    radial-gradient(900px 480px at 100% 0%, color-mix(in srgb, var(--accent-2) 6%, transparent), transparent 55%),
    var(--bg);
  background-attachment:fixed;
  color:var(--text);font-family:var(--font-body);font-size:15px;line-height:1.5;
  transition:background-color .25s var(--ease),color .25s var(--ease);
}
h1,h2,h3{font-family:var(--font-display);font-weight:600;margin:0;color:var(--ink);letter-spacing:-.01em;}
p{margin:0;}
a{color:var(--accent);text-decoration:none;}
button{font-family:var(--font-body);cursor:pointer;}
input,select,textarea{font-family:var(--font-body);}
::placeholder{color:var(--muted-2);}
:focus-visible{outline:none;box-shadow:var(--ring);border-radius:8px;}

.app{min-height:100vh;display:flex;}

.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:13px 26px;background:color-mix(in srgb, var(--surface) 88%, transparent);
  backdrop-filter:blur(14px) saturate(140%);-webkit-backdrop-filter:blur(14px) saturate(140%);
  border-bottom:1px solid var(--border);}
.brand{display:flex;align-items:center;gap:11px;}
.brand-mark{width:34px;height:34px;border-radius:10px;flex-shrink:0;
  background:linear-gradient(155deg, var(--accent), var(--ink) 130%);
  display:flex;align-items:center;justify-content:center;color:#fff;
  font-family:var(--font-display);font-weight:700;font-size:16px;box-shadow:var(--shadow-sm);}
.brand-name{font-family:var(--font-display);font-weight:600;font-size:17.5px;color:var(--ink);}
.brand-sub{font-size:11px;color:var(--muted);font-weight:500;letter-spacing:.02em;margin-top:-1px;}

.pill{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:99px;font-size:12.5px;font-weight:600;line-height:1;white-space:nowrap;}
.pill::before{content:"";width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0;}
.pill-approved{background:var(--approved-soft);color:var(--approved-strong);}
.pill-revision{background:var(--revision-soft);color:var(--revision-strong);}
.pill-rejected{background:var(--rejected-soft);color:var(--rejected-strong);}
.pill-neutral{background:var(--surface-2);color:var(--muted);border:1px solid var(--border);}
.pill-neutral::before{display:none;}

.btn{border:none;border-radius:10px;padding:10px 18px;font-size:13.5px;font-weight:600;
  transition:background-color .15s var(--ease), border-color .15s var(--ease), transform .08s var(--ease), box-shadow .15s var(--ease), opacity .15s;
  display:inline-flex;align-items:center;justify-content:center;gap:7px;letter-spacing:.005em;}
.btn:active{transform:scale(.98);}
.btn-primary{background:var(--accent);color:var(--accent-contrast);box-shadow:0 1px 2px rgba(0,0,0,.06), 0 1px 0 rgba(255,255,255,.08) inset;}
.btn-primary:hover:not(:disabled){background:var(--accent-hover);}
.btn-outline{background:var(--surface);border:1px solid var(--border-strong);color:var(--text-2);}
.btn-outline:hover:not(:disabled){background:var(--surface-2);border-color:var(--muted-2);}
.btn-ghost{background:transparent;border:1px solid transparent;color:var(--muted);}
.btn-ghost:hover:not(:disabled){background:var(--surface-2);color:var(--text);}
.btn-danger{background:transparent;border:1px solid var(--rejected-soft);color:var(--rejected-strong);}
.btn-danger:hover:not(:disabled){background:var(--rejected-soft);}
.btn:disabled{opacity:.45;cursor:not-allowed;}
.btn-icon{width:36px;height:36px;padding:0;border-radius:9px;flex-shrink:0;}
.btn-sm{padding:7px 12px;font-size:12.5px;border-radius:8px;}

.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);
  box-shadow:var(--shadow-sm);padding:22px;transition:box-shadow .2s var(--ease), border-color .2s var(--ease);}
.card-hover:hover{box-shadow:var(--shadow-md);border-color:var(--border-strong);}
.input,.select,.textarea{width:100%;padding:10.5px 14px;border-radius:10px;border:1px solid var(--border-strong);
  background:var(--surface);color:var(--text);font-size:14px;transition:border-color .15s,box-shadow .15s;}
.input:focus,.select:focus,.textarea:focus{border-color:var(--accent);box-shadow:var(--ring);}
.textarea{resize:vertical;}
.label{font-size:11.5px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-bottom:7px;display:block;}
.hint{font-size:12.5px;color:var(--muted);line-height:1.5;}

.shell{flex:1;display:flex;flex-direction:column;min-width:0;}
.main{max-width:1100px;width:100%;margin:0 auto;padding:32px 26px 70px;}

.sidebar{width:222px;flex-shrink:0;background:var(--surface);border-right:1px solid var(--border);
  padding:20px 14px;display:flex;flex-direction:column;gap:3px;}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:9px;font-size:13.8px;
  font-weight:500;color:var(--muted);border:none;background:transparent;width:100%;text-align:left;
  transition:background-color .15s, color .15s;}
.nav-item svg{flex-shrink:0;width:17px;height:17px;}
.nav-item:hover{background:var(--surface-2);color:var(--text);}
.nav-item.active{background:var(--accent-soft);color:var(--accent);font-weight:600;}

.grade-ring{position:relative;width:56px;height:56px;flex-shrink:0;}
.grade-ring svg{transform:rotate(-90deg);display:block;}
.grade-ring-value{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  font-family:var(--font-mono);font-weight:600;font-size:13px;letter-spacing:-.02em;}

.section-card{display:flex;align-items:center;gap:16px;padding:17px;border:1px solid var(--border);
  border-radius:var(--radius-lg);background:var(--surface);margin-bottom:12px;}
.badge-purple{background:var(--accent-soft);color:var(--accent);padding:3.5px 10px;border-radius:99px;font-size:11.5px;font-weight:700;letter-spacing:.01em;}
.avatar{width:30px;height:30px;border-radius:8px;background:var(--surface-3);color:var(--text-2);
  display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;
  font-family:var(--font-display);}

.table-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;font-size:13.5px;}
th{text-align:left;color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;
  letter-spacing:.05em;padding:12px 14px;border-bottom:1px solid var(--border);background:var(--surface-2);}
td{padding:13px 14px;border-bottom:1px solid var(--border);color:var(--text-2);}
tbody tr{transition:background-color .12s;}
tbody tr:hover td{background:var(--surface-2);}
tbody tr:last-child td{border-bottom:none;}

.rubric-list{display:flex;flex-direction:column;gap:7px;margin:14px 0;}
.rubric-item{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;padding:10px 13px;
  border-radius:10px;background:var(--surface-2);font-size:13px;}
.rubric-score{font-family:var(--font-mono);font-weight:700;color:var(--text-2);flex-shrink:0;}

.progress-track{width:100%;height:7px;border-radius:99px;background:var(--surface-3);overflow:hidden;}
.progress-fill{height:100%;border-radius:99px;background:linear-gradient(90deg, var(--accent), var(--accent-2));
  transition:width .5s var(--ease);}

.empty-state{text-align:center;padding:64px 24px;color:var(--muted);}
.empty-icon{width:46px;height:46px;margin:0 auto 14px;color:var(--muted-2);}
.spinner{width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--accent);border-radius:50%;
  animation:spin .7s linear infinite;display:inline-block;}
.page-loader{min-height:100vh;display:flex;align-items:center;justify-content:center;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fade-up{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}
.fade-up{animation:fade-up .35s var(--ease);}

.modal-overlay{position:fixed;inset:0;background:rgba(10,12,16,.55);backdrop-filter:blur(3px);
  display:flex;align-items:center;justify-content:center;z-index:50;padding:20px;animation:fade-up .18s var(--ease);}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-xl);max-width:540px;
  width:100%;padding:28px;box-shadow:var(--shadow-lg);max-height:85vh;overflow-y:auto;}

.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:12px;margin:16px 0;}
.stat-box{background:var(--surface-2);border:1px solid var(--border);border-radius:var(--radius);padding:15px;}
.stat-box .num{font-family:var(--font-mono);font-size:23px;font-weight:600;color:var(--ink);letter-spacing:-.02em;}
.stat-box .lbl{font-size:11.5px;color:var(--muted);margin-top:3px;font-weight:600;letter-spacing:.02em;}

.auth-shell{min-height:100vh;display:grid;grid-template-columns:1.1fr 1fr;}
.auth-visual{position:relative;overflow:hidden;background:linear-gradient(160deg, var(--ink) 0%, #0a4a44 60%, var(--accent) 130%);
  color:#fff;padding:52px;display:flex;flex-direction:column;justify-content:space-between;}
.auth-visual::before{content:"";position:absolute;inset:-20%;
  background:radial-gradient(600px 400px at 20% 15%, rgba(255,255,255,.14), transparent 60%),
             radial-gradient(500px 380px at 85% 85%, rgba(255,255,255,.10), transparent 55%);}
.auth-form-col{display:flex;align-items:center;justify-content:center;padding:32px;min-height:100vh;}
.auth-mobile-brand{display:none;}
@media(max-width:860px){
  .auth-shell{grid-template-columns:1fr;}
  .auth-visual{display:none;}
  .auth-form-col{align-items:flex-start;padding:28px 22px 40px;}
  .auth-mobile-brand{display:flex;align-items:center;gap:10px;margin-bottom:36px;}
}
@media(max-width:420px){.auth-form-col{padding:24px 18px 36px;}}

@media(max-width:760px){
  .sidebar{position:fixed;bottom:0;left:0;right:0;top:auto;width:100%;flex-direction:row;
    justify-content:space-around;border-right:none;border-top:1px solid var(--border);padding:8px;z-index:20;
    box-shadow:0 -4px 16px rgba(0,0,0,.06);}
  .nav-item{flex-direction:column;gap:4px;padding:7px 10px;font-size:10.5px;}
  .main{padding-bottom:96px;}
}
</style>
</head>
<body>
<div id="root"></div>
<script>
/* ════════════════════════════════════════════════════
   CONFIG — fill these in before deploying
   ════════════════════════════════════════════════════ */
const CONFIG = {
  SUPABASE_URL: "https://lbwdgabvajdcffsnsulq.supabase.co",
  SUPABASE_PUBLISHABLE_KEY: "sb_publishable_vRlCmjr4zJNGn3B5JMYIEw_KnbhjqP9",
  BACKEND_URL: "https://e-tuklasonlinechecker.onrender.com"
};

const { createClient } = supabase;
const sb = createClient(CONFIG.SUPABASE_URL, CONFIG.SUPABASE_PUBLISHABLE_KEY);

const h = React.createElement;
const { useState, useEffect, useMemo, useCallback, useRef } = React;

const SECTIONS = [
  { id: "abstract", label: "Abstract" },
  { id: "rationale", label: "Rationale / Background of the Study" },
  { id: "methodology", label: "Methodology" }
];
const CATEGORIES = [
  "Life Science",
  "Mathematical and Computational Science",
  "Physical Science",
  "Robotics and Intelligent Machines",
  "Innovation Expo"
];
const MAX_FILE_BYTES = 5 * 1024 * 1024;
const STATUS_META = {
  approved:      { label: "Approved",       cls: "pill-approved" },
  needs_revision:{ label: "Needs Revision", cls: "pill-revision" },
  rejected:      { label: "Rejected",       cls: "pill-rejected" },
  error:         { label: "Error",          cls: "pill-rejected" }
};

async function authedFetch(path, opts = {}) {
  const { data: { session } } = await sb.auth.getSession();
  let res;
  try {
    res = await fetch(CONFIG.BACKEND_URL + path, {
      ...opts,
      headers: {
        "Content-Type": "application/json",
        "Authorization": "Bearer " + (session?.access_token || ""),
        ...(opts.headers || {})
      }
    });
  } catch (e) {
    // fetch() throws a generic "Failed to fetch" for both real network
    // errors and CORS rejections — the browser hides the real reason from
    // JS. The most common cause here is that this page is being opened as
    // a local file (origin "null") or from a domain the backend's CORS
    // allow-list doesn't include, so the browser blocks the response
    // before it ever reaches this code.
    if (window.location.protocol === "file:") {
      throw new Error(
        "Can't reach the server because this page is open as a local file (file://). " +
        "The backend only allows requests from the deployed site " +
        "(https://sabnahis-ste.github.io/E-TuklasOnlineChecker/). " +
        "Open the app from that URL instead of double-clicking the HTML file."
      );
    }
    throw new Error(
      "Can't reach the server at " + CONFIG.BACKEND_URL + ". This is usually a CORS " +
      "or network issue — check that the backend is running and that its " +
      "Access-Control-Allow-Origin allow-list includes " + window.location.origin + "."
    );
  }
  if (!res.ok) {
    let msg = "Request failed";
    try { msg = (await res.json()).error || msg; } catch (e) {}
    throw new Error(msg);
  }
  return res;
}

/* ── Grade ring: the app's signature element ─────────── */
function GradeRing({ score, status, size = 56 }) {
  if (score == null) {
    return h("div", { className: "grade-ring", style: { width: size, height: size } },
      h("div", { className: "grade-ring-value", style: { color: "var(--muted)", fontSize: 11 } }, "—")
    );
  }
  const color = status === "approved" ? "var(--approved)" : status === "needs_revision" ? "var(--revision)" : "var(--rejected)";
  const r = (size - 9) / 2, c = 2 * Math.PI * r, offset = c * (1 - score / 100);
  return h("div", { className: "grade-ring", style: { width: size, height: size } },
    h("svg", { width: size, height: size },
      h("circle", { cx: size/2, cy: size/2, r, stroke: "var(--surface-3)", strokeWidth: 4.5, fill: "none" }),
      h("circle", { cx: size/2, cy: size/2, r, stroke: color, strokeWidth: 4.5, fill: "none",
        strokeDasharray: c, strokeDashoffset: offset, strokeLinecap: "round",
        style: { transition: "stroke-dashoffset .6s var(--ease)" } })
    ),
    h("div", { className: "grade-ring-value", style: { color: "var(--ink)" } }, score)
  );
}

function StatusPill({ status }) {
  const meta = STATUS_META[status] || { label: "Not Started", cls: "pill-neutral" };
  return h("span", { className: "pill " + meta.cls }, meta.label);
}

/* ════════════════════════════════════════════════════
   AUTH SCREEN
   ════════════════════════════════════════════════════ */
function AuthScreen() {
  const [mode, setMode] = useState("signin");
  const [email, setEmail] = useState(""), [password, setPassword] = useState("");
  const [fullName, setFullName] = useState("");
  const [error, setError] = useState(""), [loading, setLoading] = useState(false);
  const [notice, setNotice] = useState("");

  async function submit(e) {
    e.preventDefault();
    setError(""); setNotice(""); setLoading(true);
    try {
      if (mode === "signup") {
        const { error } = await sb.auth.signUp({ email, password, options: { data: { full_name: fullName } } });
        if (error) throw error;
        setNotice("Account created. Check your email to confirm, then sign in.");
        setMode("signin");
      } else {
        const { error } = await sb.auth.signInWithPassword({ email, password });
        if (error) throw error;
      }
    } catch (e) { setError(e.message); }
    setLoading(false);
  }

  return h("div", { className: "auth-shell" },
    h("div", { className: "auth-visual" },
      h("div", { style: { position: "relative", zIndex: 1, display: "flex", alignItems: "center", gap: 12 } },
        h("div", { style: { width: 38, height: 38, borderRadius: 11, background: "rgba(255,255,255,.14)", border: "1px solid rgba(255,255,255,.25)", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: "var(--font-display)", fontWeight: 700, fontSize: 17 } }, "E"),
        h("span", { style: { fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 18 } }, "E-Tuklas Checker")
      ),
      h("div", { style: { position: "relative", zIndex: 1, maxWidth: 400 } },
        h("h1", { style: { color: "#fff", fontSize: 34, lineHeight: 1.2, marginBottom: 14 } }, "Research review, without the back-and-forth."),
        h("p", { style: { color: "rgba(255,255,255,.75)", fontSize: 14.5, lineHeight: 1.65 } },
          "Upload your Abstract, Rationale, and Methodology — get instant, rubric-based AI feedback before your adviser ever sees a draft."),
        h("div", { style: { display: "flex", gap: 22, marginTop: 30 } },
          [["3", "Sections graded"], ["5", "Research categories"], ["24/7", "Instant review"]].map(([n, l]) => h("div", { key: l },
            h("div", { style: { fontFamily: "var(--font-mono)", fontSize: 20, fontWeight: 600, color: "#fff" } }, n),
            h("div", { style: { fontSize: 11.5, color: "rgba(255,255,255,.6)", marginTop: 2 } }, l)
          ))
        )
      ),
      h("div", { style: { position: "relative", zIndex: 1, fontSize: 12, color: "rgba(255,255,255,.55)" } }, "E-Tuklas Science Fair · Online Manuscript Checker")
    ),
    h("div", { className: "auth-form-col" },
      h("div", { style: { width: "100%", maxWidth: 420 } },
        h("div", { className: "auth-mobile-brand" },
          h("div", { className: "brand-mark" }, "E"),
          h("span", { style: { fontFamily: "var(--font-display)", fontWeight: 600, fontSize: 18, color: "var(--ink)" } }, "E-Tuklas Checker")
        ),
        h("form", { className: "fade-up", style: { width: "100%" }, onSubmit: submit },
        h("h2", { style: { fontSize: 23, marginBottom: 6 } }, mode === "signup" ? "Create your account" : "Welcome back"),
        h("p", { style: { color: "var(--muted)", fontSize: 13.5, marginBottom: 26 } },
          mode === "signup" ? "Set up your student or teacher account." : "Sign in to continue to your dashboard."),
        mode === "signup" && h("div", { style: { marginBottom: 15 } },
          h("label", { className: "label" }, "Full Name"),
          h("input", { className: "input", value: fullName, onChange: e => setFullName(e.target.value), required: true, placeholder: "Juan Dela Cruz" })
        ),

function ProjectSetupGate({ profile, onDone }) {
  const [category, setCategory] = useState(profile.category || "");
  const [teamMode, setTeamMode] = useState(profile.team_mode || "individual");
  const [coAuthors, setCoAuthors] = useState(profile.co_authors || []);
  const [query, setQuery] = useState("");
  const [candidates, setCandidates] = useState([]);
  const [error, setError] = useState(""), [saving, setSaving] = useState(false);

  useEffect(() => {
    if (query.trim().length < 2) { setCandidates([]); return; }
    let cancelled = false;
    sb.from("profiles").select("id, email, full_name").ilike("email", `%${query}%`).limit(6)
      .then(({ data }) => { if (!cancelled) setCandidates(data || []); });
    return () => { cancelled = true; };
  }, [query]);

  function addCoAuthor(p) {
    if (coAuthors.some(c => c.email === p.email)) return;
    setCoAuthors([...coAuthors, { email: p.email, name: p.full_name || p.email }]);
    setQuery("");
  }
  function removeCoAuthor(email) {
    setCoAuthors(coAuthors.filter(c => c.email !== email));
  }

  async function save() {
    if (!category) { setError("Pick a research category first."); return; }
    setSaving(true); setError("");
    const { error } = await sb.from("profiles").update({
      category, team_mode: teamMode,
      co_authors: teamMode === "team" ? coAuthors : []
    }).eq("id", profile.id);
    setSaving(false);
    if (error) { setError(error.message); return; }
    onDone({ ...profile, category, team_mode: teamMode, co_authors: teamMode === "team" ? coAuthors : [] });
  }

  return h("div", { className: "main", style: { maxWidth: 580 } },
    h("div", { className: "card fade-up" },
      h("div", { className: "badge-purple", style: { marginBottom: 12 } }, "Step 1 of 1 · Project Setup"),
      h("h2", { style: { marginBottom: 8, fontSize: 22 } }, "Set up your project"),
      h("p", { style: { color: "var(--muted)", fontSize: 13.5, lineHeight: 1.6, marginBottom: 22 } },
        "Pick your research category and tell us if you're working solo or with co-authors. This is required before you can upload any section — teammates automatically see whatever grade an uploaded section gets."),
      h("label", { className: "label" }, "Research Category"),
      h("select", { className: "select", value: category, onChange: e => setCategory(e.target.value), style: { marginBottom: 16 } },
        h("option", { value: "" }, "Select a category…"),
        CATEGORIES.map(c => h("option", { key: c, value: c }, c))
      ),
      h("label", { className: "label" }, "Working Mode"),
      h("div", { style: { display: "flex", gap: 8, marginBottom: 16 } },
        ["individual", "team"].map(m => h("button", {
          key: m, type: "button",
          className: "btn " + (teamMode === m ? "btn-primary" : "btn-outline"),
          style: { flex: 1 },
          onClick: () => setTeamMode(m)
        }, m === "individual" ? "Individual" : "Team"))
      ),
      teamMode === "team" && h("div", { style: { marginBottom: 16 } },
        h("label", { className: "label" }, "Add Co-Authors (search by email)"),
        h("input", { className: "input", value: query, onChange: e => setQuery(e.target.value), placeholder: "type at least 2 characters…" }),
        candidates.length > 0 && h("div", { className: "card", style: { marginTop: 6, padding: 8 } },
          candidates.map(c => h("div", {
            key: c.id, onClick: () => addCoAuthor(c),
            style: { padding: "7px 9px", borderRadius: 7, cursor: "pointer", fontSize: 13 },
            onMouseEnter: e => e.currentTarget.style.background = "var(--surface-2)",
            onMouseLeave: e => e.currentTarget.style.background = "transparent"
          }, c.full_name || c.email, h("span", { style: { color: "var(--muted)" } }, "  · " + c.email)))
        ),
        h("div", { style: { display: "flex", flexWrap: "wrap", gap: 6, marginTop: 10 } },

          ))

      error && h("div", { style: { color: "var(--rejected-strong)", background: "var(--rejected-soft)", borderRadius: 9, padding: "9px 12px", fontSize: 13, marginBottom: 14 } }, error),

/* ════════════════════════════════════════════════════
   FILE TEXT EXTRACTION (client-side, text only — no blob storage)
   ════════════════════════════════════════════════════ */
async function extractText(file) {
  if (file.size > MAX_FILE_BYTES) throw new Error("File too large (max 5MB).");
  const name = file.name.toLowerCase();
  if (name.endsWith(".txt") || name.endsWith(".md")) return await file.text();
  if (name.endsWith(".docx")) {
    if (!window.mammoth) throw new Error("Document reader not loaded — refresh and try again.");
    const buf = await file.arrayBuffer();
    const result = await window.mammoth.extractRawText({ arrayBuffer: buf });
    return result.value;
  }
  throw new Error("Unsupported file type — upload .docx or .txt.");
}

/* ════════════════════════════════════════════════════
   STUDENT DASHBOARD
   ════════════════════════════════════════════════════ */
function SectionUploadCard({ profile, sectionDef, submission, onUpdated }) {
  const [busy, setBusy] = useState(false);
  const [error, setError] = useState("");
  const fileRef = useRef();

  async function handleFile(e) {
    const file = e.target.files[0];
    e.target.value = "";
    if (!file) return;
    setBusy(true); setError("");
    try {
      const text = await extractText(file);
      if (text.trim().length < 20) throw new Error("Extracted text looks too short — check the file.");

      const { data: existing } = await sb.from("submissions")
        .select("id").eq("uploader_id", profile.id).eq("section_id", sectionDef.id).maybeSingle();

      let submissionId = existing?.id;
      if (!submissionId) {
        const { data: created, error: insErr } = await sb.from("submissions").insert({
          uploader_id: profile.id, section_id: sectionDef.id, category: profile.category,
          team_emails: (profile.co_authors || []).map(c => c.email),
          file_name: file.name, extracted_text: text
        }).select("id").single();
        if (insErr) throw insErr;
        submissionId = created.id;
      } else {
        await sb.from("submissions").update({
          file_name: file.name, extracted_text: text,
          category: profile.category, team_emails: (profile.co_authors || []).map(c => c.email)
        }).eq("id", submissionId);
      }

      const res = await authedFetch("/api/grade", {
        method: "POST",
        body: JSON.stringify({ submissionId, sectionId: sectionDef.id, text })
      });
      const { verdict } = await res.json();
      onUpdated(sectionDef.id, { ...submission, id: submissionId, file_name: file.name, ai_status: verdict.status, ai_score: verdict.scorePercent, ai_criteria: verdict.criteria, ai_remarks: verdict.remarks, ai_provider: verdict.provider });
    } catch (e) {
      setError(e.message);
    }
    setBusy(false);
  }

  const prevScore = submission?.ai_history?.[0]?.score;
  const trend = (submission?.ai_score != null && prevScore != null) ? submission.ai_score - prevScore : null;

  return h("div", { className: "card card-hover fade-up", style: { marginBottom: 14 } },
    h("div", { className: "section-card", style: { border: "none", padding: 0, marginBottom: submission ? 14 : 0 } },
      h(GradeRing, { score: submission?.ai_score, status: submission?.ai_status }),
      h("div", { style: { flex: 1 } },
        h("div", { style: { fontWeight: 600, fontSize: 15 } }, sectionDef.label),
        h("div", { style: { fontSize: 12.5, color: "var(--muted)", marginTop: 2 } },
          submission?.file_name || "No file uploaded yet"),
        trend != null && h("div", { style: { fontSize: 12, marginTop: 4, color: trend >= 0 ? "var(--approved)" : "var(--rejected)" } },
          (trend >= 0 ? "▲ +" : "▼ ") + trend + " vs. last attempt")
      ),
      h(StatusPill, { status: submission?.ai_status }),
      h("div", null,
        h("input", { type: "file", ref: fileRef, accept: ".docx,.txt,.md", style: { display: "none" }, onChange: handleFile }),
        h("button", { className: "btn btn-outline", onClick: () => fileRef.current.click(), disabled: busy },
          busy ? h("span", { className: "spinner" }) : (submission ? "Re-upload" : "Upload"))
      )
    ),
    error && h("div", { style: { color: "var(--rejected-strong)", background: "var(--rejected-soft)", borderRadius: 9, padding: "8px 12px", fontSize: 13, marginTop: 10 } }, error),
    submission?.ai_criteria && h("div", { className: "rubric-list" },
      submission.ai_criteria.map((c, i) => h("div", { className: "rubric-item", key: i },
        h("span", null, c.name, h("div", { style: { fontSize: 11.5, color: "var(--muted)", marginTop: 2 } }, c.note)),
        h("span", { className: "rubric-score" }, c.score + "/" + c.max)
      ))
    ),
    submission?.ai_remarks && h("div", { style: { fontSize: 13, marginTop: 8, lineHeight: 1.5 } },
      h("strong", null, "Remarks: "), submission.ai_remarks),
    submission?.teacher_verdict && h("div", { style: { fontSize: 13, marginTop: 10, padding: "10px 13px", borderRadius: 10, background: "var(--accent-soft)", color: "var(--accent)", borderLeft: "3px solid var(--accent)", lineHeight: 1.5 } },
      h("strong", null, "Teacher override: "), submission.teacher_verdict.score + "/100 — " + (submission.teacher_verdict.note || ""))
  );
}

  return h("div", { className: "card", style: { padding: 0 } },
    h("p", { style: { padding: "16px 18px 0", fontSize: 12.5, color: "var(--muted)" } },
      "Built automatically from each student's Project Setup — nothing to manage here."),
    h("div", { className: "table-wrap" },
      h("table", null,
        h("thead", null, h("tr", null, h("th", null, "Lead"), h("th", null, "Category"), h("th", null, "Co-Authors"), h("th", null, "Sections Approved"))),
        h("tbody", null, teams.map((t, i) => h("tr", { key: i },
          h("td", null, h("div", { style: { display: "flex", alignItems: "center", gap: 9 } },
            h("div", { className: "avatar" }, (t.lead?.full_name || t.lead?.email || "?").charAt(0).toUpperCase()),
            h("span", { style: { fontWeight: 500, color: "var(--text)" } }, t.lead?.full_name || t.lead?.email))),
          h("td", null, h("span", { className: "badge-purple" }, t.category || "—")),
          h("td", null, t.coAuthors.length ? t.coAuthors.join(", ") : "—"),
          h("td", null, h("span", { style: { fontFamily: "var(--font-mono)", fontWeight: 600 } },
            `${Object.values(t.sections).filter(s => s === "approved").length}/${SECTIONS.length}`))
        )))
      )
    )
  );
}

function AdminTab({ profile }) {
  const [users, setUsers] = useState([]);
  const [config, setConfig] = useState({ primary: "gemini", fallback: "groq" });
  const [saving, setSaving] = useState(false);

  const load = useCallback(async () => {
    const { data } = await sb.from("profiles").select("*").order("created_at", { ascending: false });
    setUsers(data || []);
  }, []);
  useEffect(() => { load(); }, [load]);
  useEffect(() => {
    authedFetch("/api/admin/config").then(r => r.json()).then(d => d.config && setConfig(d.config)).catch(() => {});
  }, []);

  async function setApproval(userId, approved) {
    try {
      await authedFetch("/api/admin/set-approval", { method: "POST", body: JSON.stringify({ userId, approved }) });
      load();
    } catch (e) {
      alert(e.message);
    }
  }
  async function setRole(userId, role) {
    try {
      await authedFetch("/api/admin/set-role", { method: "POST", body: JSON.stringify({ userId, role }) });
      load();
    } catch (e) {
      alert(e.message);
    }
  }
  async function saveConfig() {
    setSaving(true);
    try {
      await authedFetch("/api/admin/config", { method: "POST", body: JSON.stringify(config) });
    } catch (e) {
      alert(e.message);
    } finally {
      setSaving(false);
    }
  }

  return h(React.Fragment, null,
    h("div", { className: "card", style: { marginBottom: 18 } },
      h("h3", { style: { marginBottom: 4, fontSize: 15.5 } }, "AI Provider"),
      h("p", { style: { fontSize: 12.5, color: "var(--muted)", marginBottom: 14, lineHeight: 1.5 } }, "Keys live only in Render's environment — this just controls which provider is primary/fallback."),
      h("div", { style: { display: "flex", gap: 10, flexWrap: "wrap" } },
        h("select", { className: "select", style: { width: "auto" }, value: config.primary, onChange: e => setConfig({ ...config, primary: e.target.value }) },
          h("option", { value: "gemini" }, "Gemini"), h("option", { value: "groq" }, "Groq")),
        h("select", { className: "select", style: { width: "auto" }, value: config.fallback, onChange: e => setConfig({ ...config, fallback: e.target.value }) },
          h("option", { value: "groq" }, "Groq"), h("option", { value: "gemini" }, "Gemini")),
        h("button", { className: "btn btn-primary btn-sm", onClick: saveConfig, disabled: saving }, saving ? h("span", { className: "spinner" }) : "Save")
      )
    ),
    h("div", { className: "card", style: { padding: 0 } },
      h("div", { style: { padding: "16px 18px 12px", fontSize: 14, fontWeight: 600, color: "var(--ink)" } }, "User Accounts"),
      h("div", { className: "table-wrap" },
        h("table", null,
          h("thead", null, h("tr", null, h("th", null, "Name"), h("th", null, "Email"), h("th", null, "Role"), h("th", null, "Approved"), h("th", null))),
          h("tbody", null, users.map(u => h("tr", { key: u.id },
            h("td", null, h("div", { style: { display: "flex", alignItems: "center", gap: 9 } },
              h("div", { className: "avatar" }, (u.full_name || u.email || "?").charAt(0).toUpperCase()),
              h("span", { style: { fontWeight: 500, color: "var(--text)" } }, u.full_name || "—"))),
            h("td", null, u.email),
            h("td", null, h("select", { className: "select", style: { width: "auto" }, value: u.role, onChange: e => setRole(u.id, e.target.value) },
              ["student", "teacher", "admin"].map(r => h("option", { key: r, value: r }, r)))),
            h("td", null, h("span", { className: "pill " + (u.approved ? "pill-approved" : "pill-neutral") }, u.approved ? "Yes" : "No")),
            h("td", null, h("button", { className: "btn btn-outline btn-sm", onClick: () => setApproval(u.id, !u.approved) }, u.approved ? "Revoke" : "Approve"))
          )))
        )
      )
    )
  );
}

function TeacherDashboard({ profile }) {
  const [tab, setTab] = useState("overview");
  const [subs, setSubs] = useState([]);
  const [loading, setLoading] = useState(true);

  const load = useCallback(async () => {
    let { data, error } = await sb.from("submissions")
      .select("*, profiles(full_name, email)")
      .order("submitted_at", { ascending: false });

    if (error) {
      // PostgREST returns 400 here if it can't resolve a foreign-key
      // relationship between submissions and profiles (e.g. the FK isn't
      // declared, or there's more than one possible FK path). Fall back
      // to fetching both tables separately and joining client-side so the
      // dashboard still works regardless of the schema-cache issue.
      console.warn("Embedded profiles(...) select failed, falling back to manual join:", error.message);
      const { data: subsOnly, error: subsErr } = await sb.from("submissions")
        .select("*")
        .order("submitted_at", { ascending: false });
      if (subsErr) {
        console.error(subsErr);
        setSubs([]);
        setLoading(false);
        return;
      }
      const uploaderIds = [...new Set((subsOnly || []).map(s => s.uploader_id).filter(Boolean))];
      let profilesById = {};
      if (uploaderIds.length) {
        const { data: profs } = await sb.from("profiles").select("id, full_name, email").in("id", uploaderIds);
        profilesById = Object.fromEntries((profs || []).map(p => [p.id, p]));
      }
      data = (subsOnly || []).map(s => ({ ...s, profiles: profilesById[s.uploader_id] || null }));
    }

    setSubs(data || []);
    setLoading(false);
  }, []);
  useEffect(() => { load(); }, [load]);

  const ICONS = {
    overview: h("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, h("path", { d: "M14 3v4a1 1 0 0 0 1 1h4" }), h("path", { d: "M5 3h9l5 5v13a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V4a1 1 0 0 1 1-1Z" }), h("path", { d: "M9 13h6M9 17h6" })),
    stats: h("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, h("path", { d: "M3 3v18h18" }), h("path", { d: "M18 17V9M13 17V5M8 17v-4" })),
    teams: h("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, h("circle", { cx: 9, cy: 8, r: 3 }), h("path", { d: "M2 20c0-3.3 3.1-6 7-6s7 2.7 7 6" }), h("path", { d: "M16 4.5a3 3 0 0 1 0 5.9" }), h("path", { d: "M22 20c0-2.7-2.2-5-5.2-5.8" })),
    admin: h("svg", { viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, h("path", { d: "M12 2 4 5v6c0 5 3.4 8.7 8 11 4.6-2.3 8-6 8-11V5l-8-3Z" }), h("path", { d: "m9 12 2 2 4-4" }))
  };
  const tabs = [
    { id: "overview", label: "Submissions" },
    { id: "stats", label: "Stats" },
    { id: "teams", label: "Teams" },
    ...(profile.role === "admin" ? [{ id: "admin", label: "Admin" }] : [])
  ];

  return h("div", { style: { display: "flex", flex: 1, minHeight: 0 } },
    h("div", { className: "sidebar" },
      h("div", { style: { fontSize: 11, fontWeight: 700, color: "var(--muted-2)", letterSpacing: ".07em", padding: "4px 13px 10px" } }, "WORKSPACE"),
      tabs.map(t => h("button", {
        key: t.id, className: "nav-item" + (tab === t.id ? " active" : ""),
        onClick: () => setTab(t.id)
      }, ICONS[t.id], h("span", null, t.label)))
    ),
    h("div", { className: "main", style: { flex: 1 } },
      h("h2", { style: { fontSize: 21, marginBottom: 18 } },
        tabs.find(t => t.id === tab)?.label),
      loading ? h("div", { className: "empty-state" }, h("span", { className: "spinner" })) :
        tab === "overview" ? h(TeacherOverviewTab, { subs, onRefresh: load }) :
        tab === "stats" ? h(TeacherStatsTab, { subs }) :
        tab === "teams" ? h(TeacherTeamsTab, { subs }) :
        h(AdminTab, { profile })
    )
  );
}

/* ════════════════════════════════════════════════════
   ROOT APP
   ════════════════════════════════════════════════════ */
function App() {
  const [session, setSession] = useState(undefined);
  const [profile, setProfile] = useState(null);
  const [theme, setTheme] = useState(localStorage.getItem("etuklas-oc-theme") || "dark");

  useEffect(() => { document.documentElement.setAttribute("data-theme", theme); localStorage.setItem("etuklas-oc-theme", theme); }, [theme]);

  useEffect(() => {
    sb.auth.getSession().then(({ data }) => setSession(data.session));
    const { data: sub } = sb.auth.onAuthStateChange((_e, s) => setSession(s));
    return () => sub.subscription.unsubscribe();
  }, []);

  useEffect(() => {
    if (!session) { setProfile(null); return; }
    let cancelled = false;
    sb.from("profiles").select("*").eq("id", session.user.id).maybeSingle().then(({ data, error }) => {
      if (cancelled) return;
      if (error) { console.error("profile fetch failed:", error.message); }
      setProfile(data || false);
    }).catch(err => { if (!cancelled) { console.error("profile fetch threw:", err); setProfile(false); } });
    const channel = sb.channel("profile-" + session.user.id)
      .on("postgres_changes", { event: "UPDATE", schema: "public", table: "profiles", filter: `id=eq.${session.user.id}` },
        payload => setProfile(payload.new))
      .subscribe();
    return () => { cancelled = true; sb.removeChannel(channel); };
  }, [session]);

  if (session === undefined) return h("div", { className: "page-loader" }, h("span", { className: "spinner" }));
  if (!session) return h(AuthScreen);
  if (profile === null) return h("div", { className: "page-loader" }, h("span", { className: "spinner" }));
  if (profile === false) return h("div", { className: "page-loader" },
    h("div", { className: "card fade-up", style: { maxWidth: 380, textAlign: "center" } },
      h("h2", { style: { fontSize: 19, marginBottom: 8 } }, "No profile found"),
      h("p", { style: { fontSize: 13.5, color: "var(--muted-2)", lineHeight: 1.6, marginBottom: 16 } },
        "Your account was created, but no profile record exists for it yet. This usually means the database trigger that creates a profile row on signup is missing or misconfigured. Contact the site admin."),
      h("button", { className: "btn btn-outline", onClick: () => sb.auth.signOut() }, "Sign out")));

  if (!profile.approved && profile.role === "student") {
    return h("div", { className: "page-loader" },
      h("div", { className: "card fade-up", style: { maxWidth: 380, textAlign: "center" } },
        h("div", { style: { width: 48, height: 48, borderRadius: 14, background: "var(--revision-soft)", color: "var(--revision-strong)", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 16px" } },
          h("svg", { width: 22, height: 22, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" },
            h("circle", { cx: 12, cy: 12, r: 10 }), h("path", { d: "M12 6v6l4 2" }))),
        h("h2", { style: { fontSize: 19, marginBottom: 8 } }, "Awaiting approval"),
        h("p", { style: { color: "var(--muted)", fontSize: 13.5, lineHeight: 1.6 } }, "Your teacher needs to approve your account before you can submit."),
        h("button", { className: "btn btn-outline", style: { marginTop: 18 }, onClick: () => sb.auth.signOut() }, "Sign Out")
      )
    );
  }

  const isTeacher = profile.role === "teacher" || profile.role === "admin";
  const needsSetup = profile.role === "student" && !profile.category;

  return h("div", { className: "app" },
    h("div", { className: "shell" },
      h("div", { className: "topbar" },
        h("div", { className: "brand" },
          h("div", { className: "brand-mark" }, "E"),
          h("div", null,
            h("div", { className: "brand-name" }, "E-Tuklas Checker"),
            h("div", { className: "brand-sub" }, isTeacher ? "Adviser Dashboard" : "Student Dashboard")
          )
        ),
        h("div", { style: { display: "flex", alignItems: "center", gap: 10 } },
          h("div", { style: { display: "flex", alignItems: "center", gap: 9, paddingRight: 10, marginRight: 2, borderRight: "1px solid var(--border)" } },
            h("div", { className: "avatar" }, (profile.full_name || profile.email || "?").charAt(0).toUpperCase()),
            h("span", { style: { fontSize: 13, fontWeight: 500, color: "var(--text-2)", maxWidth: 150, overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" } }, profile.full_name || profile.email)
          ),
          h("button", { className: "btn btn-ghost btn-icon", onClick: () => setTheme(theme === "dark" ? "light" : "dark"), title: "Toggle theme" },
            theme === "dark"
              ? h("svg", { width: 17, height: 17, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, h("circle", { cx: 12, cy: 12, r: 4 }), h("path", { d: "M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4" }))
              : h("svg", { width: 17, height: 17, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 2, strokeLinecap: "round", strokeLinejoin: "round" }, h("path", { d: "M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z" }))
          ),
          h("button", { className: "btn btn-outline btn-sm", onClick: () => sb.auth.signOut() }, "Sign Out")
        )
      ),
      needsSetup ? h(ProjectSetupGate, { profile, onDone: setProfile }) :
        isTeacher ? h(TeacherDashboard, { profile }) : h(StudentDashboard, { profile })
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App));
</script>
<script src="https://unpkg.com/mammoth@1.6.0/mammoth.browser.min.js"></script>
</body>
